name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Frontend (build + typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # `next build` menjalankan typecheck (tsc) + lint sekaligus.
      - run: npm run build

  backend:
    name: Backend (import + compile)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      # Validasi seluruh modul ter-import (menangkap error sintaks/import).
      # Suite pytest penuh butuh DB ter-seed; jalankan lokal/terjadwal, bukan di CI.
      - run: python -c "import app.main; print('backend import OK')"
